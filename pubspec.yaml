name: chinlyrics
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.2.1+3

environment:
  sdk: '>=3.3.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.2
  http: ^1.6.0
  flutter_native_splash: ^2.2.0+1
  flutter_launcher_icons: ^0.14.4
  url_launcher: ^6.1.6
  path_provider: ^2.0.11
  permission_handler: ^12.0.1
  google_mobile_ads: ^6.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  audioplayers: ^6.5.1
  video_player: ^2.8.2
  dio: ^5.4.1
  cloud_firestore: ^6.1.3
  guitar_chord_library: ^0.0.4
  flutter_guitar_chord: ^0.0.3
  firebase_auth: ^6.2.0
  google_sign_in: ^6.2.1
  flutter_chord_mod: ^0.0.46
  googleapis_auth: ^2.0.0
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  file_picker: ^10.3.10
  image_picker: ^1.2.1
  gpt_markdown: ^1.1.5
  package_info_plus: ^9.0.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  printing: ^5.14.3
  pdf: ^3.12.0
  share_plus: ^12.0.1
  cached_network_image: ^3.4.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator:
  isar_generator:
  build_runner:
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  remove_alpha_ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0b0c0d"
  image: assets/logo.png
  android: true
  ios : true

flutter:

  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/
    - assets/khrifahlabu.jpg
    - assets/bible.json
    - assets/laihla_songs.json
    - assets/fonts/NotoSansMyanmar-Regular.ttf
    - assets/fonts/NotoSansMyanmar-Bold.ttf
flutter_lints: ^2.0.0
